# 宝塔 / CentOS：子路径部署 Nginx 片段（合并进站点「配置修改」的 server { }）
#
# 约定：
#   - 子路径：/repair/（与构建环境变量 VITE_BASE_PATH=/repair/ 一致，可自行改名）
#   - 将 `npm run build` 生成的 apps/web/dist/* 拷贝到站点根下的 repair 目录，例如：
#       /www/wwwroot/example.com/repair/index.html
#       /www/wwwroot/example.com/repair/assets/...
#   - 后端监听 127.0.0.1:8787（与 apps/server/.env 中 PORT 一致）
#
# 构建（仓库根目录，Linux）：
#   npm run build -w @qusetion-repair/core
#   npm run build -w @qusetion-repair/server
#   VITE_BASE_PATH=/repair/ npm run build -w @qusetion-repair/web

location ^~ /repair/ {
    root /www/wwwroot/example.com;
    try_files $uri $uri/ /repair/index.html;
}

location ^~ /repair/api/ {
    proxy_pass http://127.0.0.1:8787/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
}

# 将上面 root 改成你宝塔站点「网站目录」的绝对路径（勿照抄 example.com）。
# 若 try_files 与宝塔默认规则冲突，把本段放到 server 内靠前、且避免与其它 location 抢前缀。
